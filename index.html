<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLab | AI Codingr</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            black: '#000000',
            white: '#FFFFFF',
            neutral: { 100: '#f5f5f5', 200: '#e5e5e5', 800: '#1a1a1a', 900: '#0a0a0a' },
            danger: '#dc2626',
            success: '#16a34a'
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'Consolas', 'monospace'] },
          animation: { 'fade-in': 'fadeIn 0.6s ease-out', 'slide-up': 'slideUp 0.5s ease-out' },
          keyframes: { fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }, slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } } }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content-visibility: auto; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    }
  </style>
</head>
<body class="bg-black text-white font-sans min-h-screen antialiased selection:bg-white selection:text-black">

  <div class="fixed top-4 right-4 z-[60]">
    <button id="deployBtn" onclick="deployAction()" class="bg-success hover:bg-success/90 text-white font-medium py-2 px-4 rounded-lg transition-all shadow-lg">
      Deploy
    </button>
  </div>

  <div class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center px-4 animate-fade-in">
    <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_#ffffff_0px,_transparent_1px)] bg-[size:20px_20px] pointer-events-none"></div>
    <div class="max-w-md w-full text-center animate-slide-up">
      <div class="mb-8">
        <i class="fa fa-code text-white text-5xl mb-4"></i>
        <h1 class="text-[clamp(2.5rem,5vw,4rem)] font-bold tracking-tight text-shadow">CodeLab AI</h1>
        <p class="text-neutral-300 text-lg mt-2">Safe Coding • Learning Only</p>
      </div>

      <div class="bg-neutral-900/80 backdrop-blur-md rounded-2xl p-8 border border-neutral-700/50 shadow-2xl">
        <p class="text-sm text-neutral-400 mb-6 leading-relaxed">
          STRICTLY EDUCATIONAL USE<br>
          This tool follows Google Terms of Service. Any request for scams, phishing, fake pages, fraud, or illegal content will be blocked immediately.
        </p>

        <div id="errorBox" class="hidden bg-danger/20 text-danger p-3 rounded-lg mb-4 text-sm"></div>

        <div id="g_id_onload"
             data-client_id="833670070525-h2cvls75g3jjkcpe9c1cat3f6g3afs8l.apps.googleusercontent.com"
             data-callback="handleGoogleSignIn"
             data-auto_prompt="false"
             data-error_callback="handleSignInError">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="signin_with" data-shape="pill"></div>
      </div>
      <p class="text-neutral-500 text-xs mt-6">© 2026 CodeLab • Safe & Compliant</p>
    </div>
  </div>

  <script>
    function deployAction() {
      if (localStorage.getItem('currentUser')) window.location.href = '/dashboard.html';
    }

    function handleSignInError(error) {
      const errBox = document.getElementById('errorBox');
      errBox.classList.remove('hidden');
      errBox.textContent = "ERROR: Add https://codelabx.up.railway.app in Google Cloud";
    }

    function handleGoogleSignIn(response) {
      try {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const user = { name: payload.name, email: payload.email, id: payload.sub };
        localStorage.setItem('currentUser', JSON.stringify(user));
        window.location.href = '/dashboard.html';
      } catch (e) {
        alert("Sign in failed");
      }
    }

    window.onload = () => {
      if (localStorage.getItem('currentUser')) window.location.href = '/dashboard.html';
    };
  </script>
</body>
</html>
