<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Dashboard | CodeLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            black: '#000000',
            white: '#ffffff',
            danger: '#dc2626',
            success: '#16a34a',
            gray100: '#f5f5f5',
            gray200: '#e5e5e5'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    .card { @apply bg-white rounded-xl shadow-md border border-gray200 p-4 mb-3; }
  </style>
</head>
<body class="bg-gray100 min-h-screen font-sans">

  <!-- 🔒 PIN SCREEN -->
  <div id="pinScreen" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-6 w-full max-w-md text-center">
      <i class="fa fa-shield-lock text-danger text-[40px] mb-3"></i>
      <h2 class="text-xl font-bold mb-2">Secure Access</h2>
      <p class="text-sm text-gray-600 mb-4">Enter PIN to open dashboard</p>
      <input type="password" id="pinInput" maxlength="4" placeholder="••••" 
             class="w-full text-center text-xl font-bold tracking-widest border-2 border-gray200 rounded-lg py-2 mb-3 focus:border-black focus:outline-none">
      <button onclick="checkPin()" class="w-full bg-black hover:bg-gray-800 text-white py-2 rounded-lg font-medium">
        Unlock
      </button>
      <p id="pinError" class="text-danger text-xs mt-2 hidden">Wrong PIN! Try again.</p>
    </div>
  </div>

  <!-- 📊 DASHBOARD CONTENT (HIDDEN UNTIL PIN CORRECT) -->
  <div id="dashboardContent" class="hidden container mx-auto px-4 py-6 max-w-4xl">
    <h1 class="text-[22px] font-bold text-black mb-6 flex items-center gap-2">
      <i class="fa fa-ban text-danger"></i> Blocked Users Panel
    </h1>

    <div id="usersList">
      <p class="text-gray-600">Loading blocked users...</p>
    </div>
  </div>

  <script>
    // 🔐 YOUR PIN CODE
    const CORRECT_PIN = "8867";

    function checkPin() {
      const entered = document.getElementById("pinInput").value.trim();
      if (entered === CORRECT_PIN) {
        // ✅ UNLOCK
        document.getElementById("pinScreen").classList.add("hidden");
        document.getElementById("dashboardContent").classList.remove("hidden");
        loadBlockedUsers(); // Load data only after unlock
      } else {
        // ❌ WRONG PIN
        document.getElementById("pinError").classList.remove("hidden");
        setTimeout(() => document.getElementById("pinError").classList.add("hidden"), 2000);
      }
    }

    // Load blocked users from server
    async function loadBlockedUsers() {
      try {
        const res = await fetch("/api/get-blocked");
        const users = await res.json();

        if (!users || users.length === 0) {
          document.getElementById("usersList").innerHTML = `
            <div class="card text-center py-8">
              <i class="fa fa-user-times text-gray-300 text-[40px] mb-2"></i>
              <p class="text-gray-500 font-medium">No blocked users found</p>
            </div>
          `;
          return;
        }

        let html = "";
        users.forEach(u => {
          html += `
            <div class="card">
              <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div>
                  <h3 class="font-bold text-black text-[15px]">${u.name || "No Name"}</h3>
                  <p class="text-sm text-gray-600">${u.email || "No Email"}</p>
                  <p class="text-xs text-gray-500 mt-1">User ID: ${u.id || "No ID"}</p>
                  <p class="text-xs text-danger mt-1">Reason: ${u.reason || "Not specified"}</p>
                </div>
                <button onclick="unblockUser('${u.id}')" class="bg-success hover:bg-success/90 text-white px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap">
                  <i class="fa fa-unlock-alt mr-1"></i> Unblock
                </button>
              </div>
            </div>
          `;
        });

        document.getElementById("usersList").innerHTML = html;
      } catch (err) {
        document.getElementById("usersList").innerHTML = `<p class="text-danger">Error loading data: ${err.message}</p>`;
      }
    }

    // Unblock user function
    async function unblockUser(userId) {
      if (!confirm("⚠️ Are you sure? This user will regain full access.")) return;
      try {
        await fetch("/api/unblock-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: userId })
        });
        alert("✅ User Unblocked Successfully!");
        loadBlockedUsers(); // Refresh list
      } catch (err) {
        alert("❌ Error: " + err.message);
      }
    }

    // Allow Enter key to submit PIN
    document.getElementById("pinInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPin();
    });
  </script>
</body>
</html>
