<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLab | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            black: '#000000',
            white: '#FFFFFF',
            neutral: { 100: '#f5f5f5', 200: '#e5e5e5', 800: '#1a1a1a', 900: '#0a0a0a' },
            danger: '#dc2626',
            success: '#16a34a'
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'Consolas', 'monospace'] }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .code-block { background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; margin: 8px 0; font-family: monospace; white-space: pre-wrap; overflow-x: auto; }
    }
  </style>
</head>
<body class="bg-black text-white font-sans min-h-screen antialiased">

  <header class="sticky top-0 z-40 bg-black/80 backdrop-blur-md border-b border-neutral-800 px-6 py-4">
    <div class="container mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa fa-robot text-white text-xl"></i>
        <h1 class="text-lg font-semibold tracking-wide">CodeLab AI Helper</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="userName" class="text-sm text-neutral-300"></span>
        <button onclick="signOut()" class="text-sm text-neutral-400 hover:text-white transition-colors">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-6">
    <div class="mb-6 text-center">
      <div class="inline-block bg-success/20 text-success px-3 py-1 rounded-full text-xs font-medium mb-2">Safe & Compliant</div>
      <h2 class="text-3xl font-bold mb-2">AI Coding Assistant</h2>
      <p class="text-neutral-400 text-sm">Ask me anything about coding — safe & educational only</p>
    </div>

    <div class="bg-neutral-900/50 rounded-2xl p-6 border border-neutral-800/50 shadow-xl mb-8">
      <div id="chatHistory" class="h-[500px] overflow-y-auto scrollbar-hide mb-6 space-y-4 pr-2">
        <div class="text-neutral-400 text-center py-10">
          <i class="fa fa-lightbulb-o text-3xl mb-3 block"></i>
          <p>Type any coding question below — I will write full working code for you!</p>
          <p class="text-xs mt-2 text-success">All requests filtered — safe, legal, educational only</p>
          <p class="text-xs mt-1">Supports: HTML, CSS, JS, Python, C#, Java, and more</p>
        </div>
      </div>

      <div class="flex gap-3">
        <input id="userInput" type="text" placeholder="Ask me anything..." 
               class="flex-1 bg-black border border-neutral-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-white transition-colors">
        <button id="sendBtn" class="bg-white text-black hover:bg-neutral-200 px-6 py-3 rounded-xl font-medium transition-all cursor-pointer">
          Send
        </button>
      </div>
    </div>
  </main>

  <script>
    // ✅ YOUR SETTINGS
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1510688882163712005/O6qMNC7GK7r7GBX1t6iZk9knf6bFLZEwGXXSABRddZBaV5S3TZpIWfM-dJZ2n-P4Pj";
    const GROQ_API_KEY = "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"; // ← PASTE YOUR GROQ KEY HERE (gsk_...)
    const GROQ_MODEL = "llama3-70b-8192"; // Fast, best for code

    let currentUser = null;
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    const MAX_WARNINGS = 5;
    const prohibited = [
      "scam", "phishing", "fake", "steal", "hack", "fraud", "carding", "credit card",
      "illegal", "malware", "virus", "exploit", "cheat", "clone", "fake bank"
    ];

    let userData = { warnings: 0, blocked: false, faults: [] };

    window.onload = function() {
      const savedUser = localStorage.getItem('currentUser');
      if (!savedUser) return window.location.href = '/index.html';
      currentUser = JSON.parse(savedUser);
      document.getElementById('userName').textContent = currentUser.name;

      const saved = localStorage.getItem(`user_${currentUser.id}`);
      if (saved) userData = JSON.parse(saved);
      if (userData.blocked) return showBlocked();

      loadSavedChat();
      attachEvents();
    };

    function attachEvents() {
      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keydown', e => e.key === 'Enter' && sendMessage());
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || userData.blocked) return;

      addMessage(text, true);
      userInput.value = '';

      if (isBadRequest(text)) return addMessage("Request blocked — violates rules.");

      addMessage("Thinking...");
      try {
        const aiReply = await getGroqReply(text);
        removeLastMessage();
        addMessage(aiReply);
      } catch (err) {
        removeLastMessage();
        addMessage("Error: Could not get reply. Check your Groq API key.");
      }
    }

    function signOut() {
      localStorage.removeItem('currentUser');
      window.location.href = '/index.html';
    }

    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = "max-w-[85%] p-4 rounded-xl " + (isUser ? "bg-white text-black ml-auto" : "bg-neutral-800 text-white mr-auto");

      if (text.includes('```')) {
        const parts = text.split('```');
        let html = '';
        for (let i = 0; i < parts.length; i++) {
          html += (i % 2 === 1) ? `<div class="code-block">${parts[i]}</div>` : parts[i].replace(/\n/g, '<br>');
        }
        div.innerHTML = html;
      } else {
        div.innerHTML = text.replace(/\n/g, '<br>');
      }

      chatHistory.appendChild(div);
      chatHistory.scrollTop = chatHistory.scrollHeight;
      saveChat();
    }

    function removeLastMessage() {
      if (chatHistory.lastChild) chatHistory.removeChild(chatHistory.lastChild);
    }

    function isBadRequest(text) {
      const lower = text.toLowerCase();
      const found = prohibited.some(w => lower.includes(w));

      if (found) {
        userData.warnings++;
        userData.faults.push(`#${userData.warnings}: ${text}`);
        saveData();

        sendDiscord("WARNING", `User: ${currentUser.name}\nEmail: ${currentUser.email}\nWarning ${userData.warnings}/${MAX_WARNINGS}\nRequest: ${text}`, 16753920);

        if (userData.warnings >= MAX_WARNINGS) {
          userData.blocked = true;
          saveData();
          sendDiscord("USER BLOCKED", `User: ${currentUser.name}\nEmail: ${currentUser.email}\nReason: ${MAX_WARNINGS} violations\nFaults:\n${userData.faults.join('\n')}`, 14427618);
          showBlocked();
          return true;
        }
        return true;
      }
      return false;
    }

    // ✅ REAL GROQ AI CALL — FAST & CLEAN
    async function getGroqReply(prompt) {
      const systemPrompt = `You are CodeLab AI, a professional coding assistant.
- Answer ONLY coding, programming, web development, software engineering questions.
- Write FULL, WORKING, clean, correct code.
- Use proper formatting: wrap code in \`\`\`language ... \`\`\` blocks.
- Keep answers clear, educational, safe, and helpful.
- NEVER help with scams, hacks, phishing, malware, or illegal content.
- NO emojis, NO extra symbols.
- Answer directly and professionally.

Question: ${prompt}`;

      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: GROQ_MODEL,
          messages: [{ role: "user", content: systemPrompt }],
          temperature: 0.2
        })
      });

      const data = await res.json();
      if (data.choices && data.choices[0].message.content) {
        return data.choices[0].message.content;
      }
      throw new Error("No response from Groq");
    }

    function sendDiscord(title, desc, color) {
      fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          embeds: [{
            title, description: desc, color,
            timestamp: new Date().toISOString()
          }]
        })
      });
    }

    function showBlocked() {
      document.body.innerHTML = `
        <div class="fixed inset-0 bg-black flex items-center justify-center text-center p-6">
          <div>
            <h2 class="text-2xl font-bold text-danger mb-2">ACCESS BLOCKED</h2>
            <p class="text-neutral-400">${currentUser.email}<br>Too many violations<br>Account locked permanently</p>
          </div>
        </div>
      `;
    }

    function saveData() { localStorage.setItem(`user_${currentUser.id}`, JSON.stringify(userData)); }
    function saveChat() { localStorage.setItem(`chat_${currentUser.id}`, chatHistory.innerHTML); }
    function loadSavedChat() { const s = localStorage.getItem(`chat_${currentUser.id}`); if (s) chatHistory.innerHTML = s; }
  </script>
</body>
</html>
