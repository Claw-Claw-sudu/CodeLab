<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CodeLab | Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <!-- ✅ PROPER MARKDOWN -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            black: '#000000',
            white: '#ffffff',
            gray100: '#f5f5f5',
            gray200: '#e5e5e5',
            gray300: '#d4d4d4',
            gray600: '#525252',
            gray800: '#262626',
            danger: '#000000'
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .chat-bubble { max-width: 78%; width: fit-content; line-height: 1.5; }
      @media (max-width: 640px) { .chat-bubble { max-width: 88%; } }
      .code-block { background: #1a1a1a; color: #ffffff; border-radius: 0.5rem; padding: 0.75rem; margin: 0.5rem 0; font-family: monospace; font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap; border: 1px solid #333; }
      .star { cursor: pointer; transition: all 0.2s; }
      .star.active { color: #000; }
      .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
      .sidebar.open { transform: translateX(0); }
      /* ✅ FIX BOLD SIZE */
      strong, b { font-weight: 600 !important; font-size: inherit !important; }
      em, i { font-style: italic; font-size: inherit !important; }
    }
  </style>
</head>
<body class="bg-white text-black font-sans min-h-screen antialiased">

  <!-- Sidebar Menu -->
  <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-[260px] bg-white border-r border-gray200 z-50 shadow-lg p-4">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-bold text-lg">Menu</h3>
      <button onclick="toggleSidebar()" class="text-xl">×</button>
    </div>

    <!-- Search -->
    <div class="mb-4">
      <input type="text" id="searchInput" placeholder="Search messages..." 
             class="w-full px-3 py-2 border border-gray200 rounded-lg text-sm">
    </div>
    <button onclick="searchChat()" class="w-full bg-black text-white py-2 rounded-lg text-sm mb-6">
      <i class="fa fa-search mr-2"></i> Search
    </button>

    <!-- New Chat -->
    <button onclick="newChat()" class="w-full bg-gray100 hover:bg-gray200 text-black py-2 rounded-lg text-sm mb-4">
      <i class="fa fa-plus mr-2"></i> New Chat
    </button>

    <div class="mt-auto text-xs text-gray600 absolute bottom-4 left-0 right-0 text-center">
      CodeLab AI © 2026
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

  <header class="sticky top-0 z-30 bg-white border-b border-gray200 px-4 py-3 shadow-sm">
    <div class="container mx-auto flex items-center justify-between">
      <button id="burgerBtn" onclick="toggleSidebar()" class="text-black hover:text-gray600 transition-colors mr-2">
        <i class="fa fa-bars text-lg"></i>
      </button>

      <div class="flex items-center gap-3 flex-1">
        <div class="w-8 h-8 rounded-full bg-black flex items-center justify-center text-white">
          <i class="fa fa-robot"></i>
        </div>
        <div>
          <h1 class="font-semibold text-sm">CodeLab AI</h1>
          <p class="text-[10px] text-gray600">Online • Friendly Assistant</p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <span id="userName" class="text-xs text-gray600 truncate max-w-[90px]"></span>
        <button onclick="signOut()" class="text-xs text-black hover:text-gray600">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-3 py-3 max-w-2xl">
    <!-- Block Notice + APPEAL FORM -->
    <div id="blockNotice" class="hidden mb-4 p-3 bg-gray100 border border-black rounded-xl text-center">
      <h2 class="text-sm font-bold text-black mb-1">❌ ACCOUNT BLOCKED</h2>
      <p class="text-xs text-gray600 mb-2">You have been blocked. Access disabled.</p>
      
      <div class="mt-3 p-2 bg-white rounded-lg border border-gray200">
        <p class="text-xs font-medium mb-2">Submit Appeal:</p>
        <textarea id="appealReason" placeholder="Why should we unblock you?" class="w-full p-2 text-xs border border-gray200 rounded mb-2"></textarea>
        <button onclick="sendAppeal()" class="bg-black text-white px-3 py-1 rounded text-xs">Send Appeal</button>
      </div>
    </div>

    <div id="normalContent">
      <div id="chatHistory" class="h-[calc(100vh-180px)] overflow-y-auto scrollbar-hide mb-4 space-y-4 py-2 px-1">
        <div class="flex justify-center my-6">
          <span class="text-[10px] text-gray600 bg-gray100 px-3 py-1 rounded-full">Today</span>
        </div>
        <div class="flex justify-start mb-3">
          <div class="chat-bubble bg-gray100 text-black rounded-tr-2xl rounded-br-2xl rounded-bl-md p-3 border border-gray200">
            <p class="text-sm">Hi there! 😊 I'm CodeLab AI — I can help with coding, homework, advice, or just chat! What do you want to talk about?</p>
          </div>
        </div>
      </div>

      <!-- RATING BOX WITH SEND BUTTON -->
      <div id="ratingBox" class="mb-4 p-3 bg-gray100 rounded-xl text-center hidden">
        <p class="text-sm font-medium mb-2">Rate your experience:</p>
        <div class="flex justify-center gap-1 mb-2">
          <i class="fa fa-star star text-gray300 text-lg" data-rating="1"></i>
          <i class="fa fa-star star text-gray300 text-lg" data-rating="2"></i>
          <i class="fa fa-star star text-gray300 text-lg" data-rating="3"></i>
          <i class="fa fa-star star text-gray300 text-lg" data-rating="4"></i>
          <i class="fa fa-star star text-gray300 text-lg" data-rating="5"></i>
        </div>
        <textarea id="ratingComment" placeholder="Add comment (optional)..." class="w-full p-2 text-xs border border-gray200 rounded-lg bg-white mb-2"></textarea>
        <button onclick="submitRating()" class="bg-black text-white px-4 py-2 rounded-lg text-sm font-medium">
          ✅ Send Rating
        </button>
      </div>

      <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray200 px-3 py-3 z-20">
        <div class="container mx-auto max-w-2xl flex items-end gap-2">
          
          <label for="imageInput" class="cursor-pointer text-gray600 hover:text-black mb-1">
            <i class="fa fa-paperclip text-lg"></i>
          </label>
          <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageSelect(event)">

          <div class="flex-1 relative">
            <input id="userInput" type="text" placeholder="Type your message..." 
                   class="w-full bg-gray100 border border-gray200 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:border-black">
            <div id="imagePreview" class="hidden absolute bottom-full left-0 mb-2 p-2 bg-white rounded-lg shadow-md border border-gray200">
              <img id="previewImg" class="w-20 h-20 object-cover rounded" />
              <button onclick="removeImage()" class="absolute -top-2 -right-2 w-5 h-5 bg-black text-white rounded-full flex items-center justify-center text-xs">×</button>
            </div>
          </div>

          <button id="sendBtn" class="bg-black hover:bg-gray800 text-white rounded-full w-9 h-9 flex items-center justify-center transition-all">
            <i class="fa fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const ADMIN_EMAIL = "safeshellez2@gmail.com";
    const APPEAL_LINK = "https://codelabx.app.railway.app/secret-dashboard-jojo67";
    const GROQ_MODEL = "llama-3.1-8b-instant";

    let currentUser = null;
    let selectedImageBase64 = null;
    let userRating = 0;
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const blockNotice = document.getElementById('blockNotice');
    const normalContent = document.getElementById('normalContent');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    const MAX_WARNINGS = 5;
    const prohibited = ["scam", "phishing", "fake", "steal", "hack", "fraud", "carding", "credit card", "illegal", "malware", "virus", "exploit", "cheat", "clone", "fake bank"];
    let userData = { warnings: 0, blocked: false, faults: [] };

    // ✅ Fix markdown so **bold** works right
    marked.setOptions({
      breaks: true,
      gfm: true,
      sanitize: false
    });

    window.onload = function() {
      const savedUser = localStorage.getItem('currentUser');
      if (!savedUser) return window.location.href = '/index.html';
      currentUser = JSON.parse(savedUser);
      document.getElementById('userName').textContent = currentUser.name;

      const saved = localStorage.getItem(`user_${currentUser.id}`);
      if (saved) userData = JSON.parse(saved);

      if (userData.blocked) {
        showBlockedNotice();
        return;
      }

      loadSavedChat();
      attachEvents();
      setupStars();
      sendLog("✅ NEW USER", `Name: ${currentUser.name}\nEmail: ${currentUser.email}`, 0);
      showRatingBox();
    };

    // ✅ BURGER MENU FUNCTION
    function toggleSidebar() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('hidden');
    }

    // ✅ NEW CHAT
    function newChat() {
      if (confirm("Start new chat? Old messages will be cleared.")) {
        chatHistory.innerHTML = `
          <div class="flex justify-center my-6"><span class="text-[10px] text-gray600 bg-gray100 px-3 py-1 rounded-full">Today</span></div>
          <div class="flex justify-start mb-3"><div class="chat-bubble bg-gray100 text-black rounded-tr-2xl rounded-br-2xl rounded-bl-md p-3 border border-gray200"><p class="text-sm">Hi there! 😊 I'm CodeLab AI — I can help with coding, homework, advice, or just chat! What do you want to talk about?</p></div></div>
        `;
        localStorage.removeItem(`chat_${currentUser.id}`);
        toggleSidebar();
      }
    }

    // ✅ SEARCH CHAT
    function searchChat() {
      const term = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!term) return alert("Type something to search!");
      const messages = chatHistory.querySelectorAll('.chat-bubble p');
      let found = false;
      messages.forEach(el => {
        if (el.textContent.toLowerCase().includes(term)) {
          el.parentElement.style.border = "2px solid red";
          found = true;
        } else {
          el.parentElement.style.border = "";
        }
      });
      if (!found) alert("Not found!");
      toggleSidebar();
    }

    function attachEvents() {
      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keydown', e => e.key === 'Enter' && sendMessage());
    }

    // ⭐ RATING WITH SEND BUTTON
    function setupStars() {
      document.querySelectorAll('.star').forEach(star => {
        star.addEventListener('mouseover', () => {
          const rating = parseInt(star.dataset.rating);
          highlightStars(rating);
        });
        star.addEventListener('click', () => {
          userRating = parseInt(star.dataset.rating);
          highlightStars(userRating);
        });
      });
      document.querySelector('#ratingBox').addEventListener('mouseleave', () => highlightStars(userRating));
    }
    function highlightStars(rating) {
      document.querySelectorAll('.star').forEach((s,i) => {
        s.classList.toggle('active', i < rating);
        s.classList.toggle('text-gray300', i >= rating);
      });
    }
    function showRatingBox() { document.getElementById('ratingBox').classList.remove('hidden'); }
    function submitRating() {
      if (userRating === 0) return alert("Please click stars first!");
      const comment = document.getElementById('ratingComment').value.trim() || "No comment";
      fetch("/api/send-email", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          type: "rating",
          to: ADMIN_EMAIL,
          name: currentUser.name,
          email: currentUser.email,
          rating: userRating + "/5",
          comment: comment
        })
      }).then(() => {
        alert("✅ Sent! Thank you");
        document.getElementById('ratingBox').innerHTML = "<p class='text-xs text-center font-medium'>✅ Rating submitted</p>";
      });
    }

    // 📸 IMAGE UPLOAD
    function handleImageSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        selectedImageBase64 = ev.target.result;
        document.getElementById('previewImg').src = selectedImageBase64;
        document.getElementById('imagePreview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }
    function removeImage() {
      selectedImageBase64 = null;
      document.getElementById('imagePreview').classList.add('hidden');
      document.getElementById('imageInput').value = "";
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text && !selectedImageBase64 || userData.blocked) return;

      addMessage(text, true, selectedImageBase64);
      userInput.value = '';
      if (selectedImageBase64) removeImage();

      if (isBadRequest(text)) return addMessage("⚠️ Sorry, I can't help with that.", false);

      addMessage("Typing... ✨", false);

      try {
        // ✅ AI NOW SENDS CLEAN MARKDOWN — NO BROKEN TEXT
        const res = await fetch("/api/ai", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: `You are CodeLab AI, friendly & helpful. Use **bold** for important words, *italic* for emphasis, \`code\` for short code, and \`\`\` for big code blocks. Answer ANYTHING, keep text normal size, NO weird formatting, NO index.html text. User said: ${text}`,
            model: GROQ_MODEL
          })
        });
        const data = await res.json();
        removeLastMessage();
        if (data.reply) addMessage(data.reply, false);
        else addMessage("❌ Oops, error! Try again.", false);
      } catch (err) {
        removeLastMessage();
        addMessage("❌ No connection.", false);
      }
    }

    function addMessage(text, isUser = false, image = null) {
      const div = document.createElement('div');
      div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-3`;

      let content = '';
      if (image) {
        content += `<img src="${image}" class="max-w-[160px] max-h-[160px] rounded-xl mb-2 border border-gray200" />`;
      }
      if (text) {
        // ✅ RENDER MARKDOWN PROPERLY — NO BROKEN STUFF
        content = marked.parse(text);
      }

      div.innerHTML = `
        <div class="chat-bubble ${isUser ? 'bg-black text-white rounded-tl-2xl rounded-bl-2xl rounded-tr-md' : 'bg-gray100 text-black rounded-tr-2xl rounded-br-2xl rounded-bl-md'} p-3 border border-gray200">
          <p class="text-sm">${content}</p>
        </div>
      `;

      chatHistory.appendChild(div);
      chatHistory.scrollTop = chatHistory.scrollHeight;
      saveChat();
    }

    function removeLastMessage() {
      if (chatHistory.lastChild) chatHistory.removeChild(chatHistory.lastChild);
    }

    function isBadRequest(text) {
      const lower = text.toLowerCase();
      const found = prohibited.some(w => lower.includes(w));

      if (found) {
        userData.warnings++;
        userData.faults.push(`#${userData.warnings}: ${text}`);
        saveData();
        sendLog("⚠️ WARNING", `User: ${currentUser.name}\nWarning ${userData.warnings}/${MAX_WARNINGS}\nMsg: ${text}`, 0);

        if (userData.warnings >= MAX_WARNINGS) {
          userData.blocked = true;
          saveData();
          const reason = `Reached ${MAX_WARNINGS} violations | Faults: ${userData.faults.join(' | ')}`;
          
          fetch("/api/block-user", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({id: currentUser.id, name: currentUser.name, email: currentUser.email, reason})
          });

          // ✅ EMAIL TO USER ONLY
          fetch("/api/send-email", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
              type: "blocked",
              to: currentUser.email,
              name: currentUser.name,
              reason: reason,
              appeal_link: APPEAL_LINK
            })
          });

          sendLog("❌ BLOCKED", `User: ${currentUser.name}\nEmail: ${currentUser.email}\nReason: ${reason}\nAppeal: ${APPEAL_LINK}`, 0);
          
          showBlockedNotice();
          setTimeout(() => signOut(), 3000);
          return true;
        }
        return true;
      }
      return false;
    }

    // ✅ APPEAL → ONLY TO WEBHOOK
    function sendAppeal() {
      const reason = document.getElementById('appealReason').value.trim();
      if (!reason) return alert("Please write your reason first!");
      sendLog("📨 NEW APPEAL", `User: ${currentUser.name}\nEmail: ${currentUser.email}\nReason: ${reason}`, 0);
      alert("✅ Appeal sent! We will review it.");
      document.getElementById('appealReason').value = "";
    }

    function showBlockedNotice() {
      blockNotice.classList.remove('hidden');
      normalContent.classList.add('hidden');
    }

    // ✅ LOG → TO WEBHOOK
    function sendLog(title, desc, color) {
      fetch("/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, desc, color })
      }).catch(() => {});
    }

    function signOut() {
      localStorage.removeItem('currentUser');
      window.location.href = '/index.html';
    }
    function saveData() { localStorage.setItem(`user_${currentUser.id}`, JSON.stringify(userData)); }
    function saveChat() { localStorage.setItem(`chat_${currentUser.id}`, chatHistory.innerHTML); }
    function loadSavedChat() { const s = localStorage.getItem(`chat_${currentUser.id}`); if (s) chatHistory.innerHTML = s; }
  </script>
</body>
</html>
